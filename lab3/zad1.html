<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>zad1</title>
</head>
<body>
<header>
    <h1>Biblioteka akademicka</h1>
    <p>Wiedza otwiera drzwi &ndash; zapisz się i czytaj bez granic</p>
</header>
<main>
<h1>Biblioteka Akademicka - Rejestracja czytelnika</h1>
<form action="rejestracja.php" method="post" enctype="multipart/form-data">
    <fieldset>
        <Legend>Dane osobowe</Legend>
        <p>
            <label for="imie">Imię:</label><br>
            <input type="text" name="imie" id="imie" required placeholder="Wpisz imię" autofocus minlength="2" maxlength="50">
        </p>
        <p>
            <label for="nazwisko">Nazwisko:</label><br>
            <input type="text" name="nazwisko" id="nazwisko" required placeholder="Wpisz nazwisko" maxlength="60">
        </p>
        <p>
            <label for="email">Adres e-mail:</label><br>
            <input type="email" name="email" id="email" required placeholder="adres@example.com" multiple>
        </p>
        <p>
            <label for="telefon">Numer telefonu:</label><br>
            <input type="tel" name="telefon" id="telefon" pattern="[0-9]{9}" placeholder="123456789" maxlength="9">
        </p>
        <p>
            <label for="data">Data urodzenia:</label><br>
            <input type="date" name="data" id="data" min="1900-01-01" max="2026-12-31">
        </p>
        <p>
            Płeć:<br>
            <input type="radio" id="plec1" name="plec" value="kobieta">
            <label for="plec1">Kobieta</label>
            <input type="radio" id="plec2" name="plec" value="mezczyzna">
            <label for="plec2">Mężczyzna</label>
            <input type="radio" id="plec3" name="plec" value="inna">
            <label for="plec3">Inna</label>
        </p>
        <p>
            <label for="pesel">Numer PESEL:</label><br>
            <input type="password" name="pesel" id="pesel" pattern="[0-9]{11}" autocomplete="off" maxlength="11" placeholder="11 cyfr">
        </p>
    </fieldset>
    <fieldset>
        <legend>Adres</legend>
        <p>
            <label for="adres">Ulica i numer:</label><br>
            <input type="text" name="adres" id="adres" required placeholder="np. ul. Książkowa 5/10">
        </p>
        <p>
            <label for="pocztowy">Kod pocztowy:</label><br>
            <input type="text" name="pocztowy" id="pocztowy" pattern="[0-9]{2}-[0-9]{3}" placeholder="00-000" maxlength="6">
        </p>
        <p>
            <label for="miasto">Miasto:</label><br>
            <input list="miasta" name="miasto" id="miasto">
            <datalist id="miasta">
                <option value="Gdańsk">Gdańsk</option>
                <option value="Warszawa">Warszawa</option>
                <option value="Poznań">Poznań</option>
                <option value="Kraków">Kraków</option>
                <option value="Wrocław">Wrocław</option>
                <option value="Katowice">Katowice</option>
            </datalist>
        </p>
        <p>
            <label for="kraj">Kraj:</label>
            <select name="kraj" id="kraj" required>
                <optgroup label="Europa">
                    <option value="Polska" selected>Polska</option>
                    <option value="Niemcy">Niemcy</option>
                    <option value="Francja">Francja</option>
                    <option value="Hiszpania">Hiszpania</option>
                </optgroup>
                <optgroup label="Azja">
                    <option value="Chiny">Chiny</option>
                    <option value="Japonia">Japonia</option>
                    <option value="Indie">Indie</option>
                    <option value="Tajlandia">Tajlandia</option>
                </optgroup>
            </select>
        </p>
    </fieldset>
    <fieldset>
        <legend>Preferencje czytelnicze</legend>
        <p>
            <label>Ulubione gatunki literackie:</label><br>
            <input type="checkbox" id="kryminal" name="kryminal">
            <label for="kryminal">Kryminał</label>
            <input type="checkbox" id="fantasy" name="fantasy">
            <label for="fantasy">Fantasy</label>
            <input type="checkbox" id="sci-fi" name="sci-fi">
            <label for="sci-fi">Science Fiction</label>
            <input type="checkbox" id="romans" name="romans">
            <label for="romans">Romans</label>
            <input type="checkbox" id="lit-fakt" name="lit-fakt">
            <label for="lit-fakt">Literatura faktu</label>
            <input type="checkbox" id="historia" name="historia">
            <label for="historia">Historia</label>
        </p>
        <p>
            <label for="ksiazki-mies">Liczba wypożyczanych książek miesięcznie:</label><br>
            <input type="number" id="ksiazki-mies" name="ksiazki-mies" min="1" max="20" step="1" value="3">
        </p>
        <p>
            <label for="pora-odwiedzin">Preferowana pora odwiedzin:</label><br>
            <input type="time" id="pora-odwiedzin" name="pora-odwiedzin" min="07:00" max="22:00">
        </p>
        <p>
            <label for="akt-czyt">Aktywność czytelnicza (0-10):</label><br>
            <input type="range" id="akt-czyt" name="akt-czyt" min="0" max="10" step="1">
            <output for="akt-czyt">5</output>
        </p>
        <p>
            <label for="kolor-okladki">Ulubiony kolor okładki:</label><br>
            <input type="color" id="kolor-okladki" name="kolor-okladki" value="#3498db">
        </p>
        <p>
            <label for="profil-czyt">Link do profilu czytelnika (blog/strona):</label><br>
            <input type="url" id="profil-czyt" name="profil-czyt" placeholder="https://">
        </p>
        <p>
            <label for="zdjecie">Zdjęcie legitymacyjne:</label><br>
            <input type="file" id="zdjecie" name="zdjecie" accept="image/png, image/jpeg">
        </p>
        <p>
            <label for="komentarz">Komentarz / uwagi:</label><br>
            <textarea id="komentarz" name="komentarz" rows="5" cols="50" maxlength="500" placeholder="Wpisz dodatkowe uwagi (max 500 znaków)..."></textarea>
        </p>
    </fieldset>
    <p>
        <label for="wypelnienie">Wypełnienie profilu:</label><br>
        <meter id="wypelnienie" value="0.4"  min="0" max="1" low="0.3" high="0.7" optimum="0.9"></meter>
    </p>
    <p>
        <label for="weryfikacja-konta">Postęp weryfikacji konta:</label><br>
        <progress id="weryfikacja-konta" value="25" max="100"></progress>
    </p>
    <p>
        <button id="zarejestruj-sie" type="submit">Zarejestruj się</button>
        <button id="wyczysc-form" type="reset">Wyczyść formularz</button>
    </p>
</form>
</main>
<footer>
    <p>&copy <time datetime="2026">2026</time> Biblioteka Akademicka. Wszelkie prawa zastrzeżone.</p>
    <p>Kontakt: <a href="mailto:biblioteka@akademia.pl">biblioteka@akademia.pl</a></p>
</footer>
</body>
</html>
